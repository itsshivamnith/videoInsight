<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background with Deep Blue (#1a2a6c) to Electric Blue (#4a90e2) Gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2a6c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a90e2;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Rounded Square Background -->
  <rect x="25.6" y="25.6" width="460.8" height="460.8" rx="100" ry="100" fill="url(#grad1)" />

  <!-- Play Button (Video) Symbol -->
  <path d="M180,140 L180,372 L380,256 Z" fill="#ffffff" filter="url(#glow)"/>

  <!-- Lightbulb (Insight) Symbol Overlay -->
  <path d="M255,190 C220,190 190,220 190,256 C190,275 200,292 215,302 L215,330 C215,338 221,345 230,345 L280,345 C288,345 295,338 295,330 L295,302 C310,292 320,275 320,256 C320,220 290,190 255,190 Z M230,360 L280,360 L280,375 C280,383 273,390 265,390 L245,390 C237,390 230,383 230,375 L230,360 Z" fill="#1a2a6c"/>
  
  <!-- Lightbulb filaments -->
  <rect x="250" y="235" width="10" height="25" fill="#ffffff" rx="5" />
  <rect x="225" y="255" width="30" height="10" fill="#ffffff" rx="5" />
  <rect x="255" y="255" width="30" height="10" fill="#ffffff" rx="5" />
</svg>
